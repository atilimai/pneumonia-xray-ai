name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Use this template to propose a new feature or an improvement to the project.

  - type: textarea
    id: summary
    attributes:
      label: Feature Summary
      description: A short, clear description of the feature or improvement.
      placeholder: What would you like to see added or changed?
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this feature needed? What problem does it solve?
      placeholder: Describe the motivation or use case...
    validations:
      required: true

  - type: textarea
    id: proposed
    attributes:
      label: Proposed Solution
      description: If you have an idea for how this could be implemented, describe it here. This is optional.
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Describe any alternative approaches you considered and why this one is preferred.
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other relevant context, references, or links.
    validations:
      required: false
